{{ template "base.html" . }}

{{ define "doctitle" }}Error — Officetracker{{ end }}

{{ define "pagestyle" }}
<style>
    .errpage { max-width: 480px; padding: 48px 0; }
    .err-code { font-size: 13px; font-weight: 500; color: var(--text-3); margin: 0 0 6px; }
    .err-msg { font-size: 14.5px; color: var(--text-2); margin: 0 0 24px; }
</style>
{{ end }}

{{ define "content" }}
<div class="errpage">
    {{if .StatusCode}}<p class="err-code">{{.StatusCode}}</p>{{end}}
    <h1>Something went wrong</h1>
    <p class="err-msg">{{ .ErrorMessage }}</p>
    <a href="/" class="btn">Back to calendar</a>
</div>
{{ end }}
