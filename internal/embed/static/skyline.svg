<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMax slice">
    <!-- Minimal flat skyline. Element ids (sky-bg, sun-moon) and classes
         (stars, clouds) are manipulated by the theme JS for the
         time-of-day and weather options. -->
    <defs>
        <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#bfd9ee"/>
            <stop offset="1" stop-color="#eef5fa"/>
        </linearGradient>
        <linearGradient id="skyGradientMorning" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f6cfa5"/>
            <stop offset="1" stop-color="#fdf0e0"/>
        </linearGradient>
        <linearGradient id="skyGradientEvening" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#b9a3c9"/>
            <stop offset="1" stop-color="#f0d8c5"/>
        </linearGradient>
        <linearGradient id="skyGradientNight" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0e1726"/>
            <stop offset="1" stop-color="#243450"/>
        </linearGradient>
    </defs>

    <rect id="sky-bg" width="1440" height="800" fill="url(#skyGradient)"/>

    <circle id="sun-moon" cx="1130" cy="140" r="34" fill="#fffce8" opacity="0.9"/>

    <g class="stars" opacity="0" fill="#ffffff">
        <circle cx="120" cy="90" r="1.5"/>
        <circle cx="310" cy="150" r="1.2"/>
        <circle cx="520" cy="70" r="1.6"/>
        <circle cx="700" cy="180" r="1.1"/>
        <circle cx="880" cy="100" r="1.4"/>
        <circle cx="1010" cy="220" r="1.2"/>
        <circle cx="1250" cy="80" r="1.5"/>
        <circle cx="1380" cy="190" r="1.2"/>
        <circle cx="420" cy="240" r="1.3"/>
        <circle cx="1180" cy="300" r="1.1"/>
    </g>

    <g class="clouds" fill="#ffffff">
        <ellipse cx="260" cy="170" rx="95" ry="16" opacity="0.22"/>
        <ellipse cx="710" cy="110" rx="125" ry="18" opacity="0.18"/>
        <ellipse cx="1060" cy="220" rx="100" ry="14" opacity="0.2"/>
    </g>

    <!-- back row -->
    <g fill="#67788e" opacity="0.5">
        <rect x="0" y="600" width="90" height="200"/>
        <rect x="110" y="560" width="70" height="240"/>
        <rect x="200" y="620" width="120" height="180"/>
        <rect x="350" y="540" width="80" height="260"/>
        <rect x="388" y="500" width="4" height="40"/>
        <rect x="460" y="600" width="100" height="200"/>
        <rect x="590" y="570" width="70" height="230"/>
        <rect x="690" y="610" width="110" height="190"/>
        <rect x="830" y="550" width="90" height="250"/>
        <rect x="872" y="514" width="4" height="36"/>
        <rect x="950" y="600" width="120" height="200"/>
        <rect x="1100" y="560" width="80" height="240"/>
        <rect x="1210" y="610" width="110" height="190"/>
        <rect x="1350" y="580" width="90" height="220"/>
    </g>

    <!-- front row -->
    <g fill="#2f3b4c" opacity="0.95">
        <rect x="40" y="680" width="110" height="120"/>
        <rect x="180" y="650" width="80" height="150"/>
        <rect x="290" y="700" width="130" height="100"/>
        <rect x="450" y="660" width="90" height="140"/>
        <rect x="570" y="690" width="120" height="110"/>
        <rect x="720" y="640" width="85" height="160"/>
        <rect x="759" y="610" width="3" height="30"/>
        <rect x="840" y="700" width="140" height="100"/>
        <rect x="1010" y="660" width="95" height="140"/>
        <rect x="1140" y="690" width="120" height="110"/>
        <rect x="1290" y="650" width="90" height="150"/>
        <rect x="1400" y="700" width="40" height="100"/>
    </g>
</svg>
