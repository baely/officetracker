name: Smokescreen

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    name: "Smoke Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Run Smoke Test
        run: |
          set -euo pipefail

          cp ./config/sample.env ./config/local.env

          docker compose up --build -d

          echo "Waiting for health checks..."
          while docker compose ps | grep -q "starting"; do
            sleep 5
          done

          BASE=http://localhost:8080/api/v1
          TOKEN="officetracker:smoke-test-secret-token-1234"

          # Health check (unauthenticated)
          echo "=== Health check ==="
          curl -sf $BASE/health/check
          echo

          # Seed a test user and API token
          docker compose exec -T postgres psql -U postgres -d postgres -c "
            INSERT INTO users (user_id) VALUES (999) ON CONFLICT DO NOTHING;
            INSERT INTO secrets (user_id, secret, active, name)
              VALUES (999, '${TOKEN}', true, 'smoke-test-token')
              ON CONFLICT DO NOTHING;
          "

          # Authenticated health check
          echo "=== Auth check ==="
          curl -sf -H "Authorization: Bearer ${TOKEN}" $BASE/health/auth
          echo

          # PUT a day state (1 = work from home)
          echo "=== PUT day ==="
          curl -sf -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"data":{"state":1}}' \
            $BASE/state/2026/4/6
          echo

          # GET the day back
          echo "=== GET day ==="
          curl -sf -H "Authorization: Bearer ${TOKEN}" $BASE/state/2026/4/6
          echo

          # GET the month
          echo "=== GET month ==="
          curl -sf -H "Authorization: Bearer ${TOKEN}" $BASE/state/2026/4
          echo

          # PUT a note
          echo "=== PUT note ==="
          curl -sf -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"data":{"note":"smoke test note"}}' \
            $BASE/note/2026/4
          echo

          # GET the note back
          echo "=== GET note ==="
          curl -sf -H "Authorization: Bearer ${TOKEN}" $BASE/note/2026/4
          echo

          echo "All smoke tests passed!"
          docker compose down
